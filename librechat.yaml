version: 1.2.8

endpoints:
  custom:
    - name: "Bedrock-Mantle"
      apiKey: "${BEDROCK_MANTLE_API_KEY}"
      baseURL: "${BEDROCK_MANTLE_BASE_URL}"
      models:
        fetch: true
      titleConvo: true
      titleModel: "current_model"
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "Amazon Bedrock Mantle"

version: 1.2.8

endpoints:
  custom:
    - name: "Bedrock-Mantle"
      apiKey: "${BEDROCK_MANTLE_API_KEY}"
      baseURL: "${BEDROCK_MANTLE_BASE_URL}"
      models:
        default:
          - "anthropic.claude-sonnet-4-6"
          - "anthropic.claude-opus-4-6-v1"
        fetch: false
      titleConvo: true
      titleModel: "current_model"
      summarize: false
      forcePrompt: false
      modelDisplayLabel: "Amazon Bedrock Mantle"